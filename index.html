<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的 TOEIC 字卡</title>

  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #000;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(100%, 640px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px 20px 32px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    h1 {
      margin: 0;
      text-align: center;
      color: #a1a1a8;
      font-size: 28px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .folder-list {
      display: grid;
      gap: 22px;
      margin-top: 46px;
    }

    .folder-item,
    .add-folder-button {
      width: 100%;
      border: 1px solid #252529;
      border-radius: 24px;
      background: #1c1c1e;
      box-shadow: 0 14px 28px rgba(18, 18, 28, 0.34);
    }

    .folder-item {
      min-height: 148px;
      padding: 34px 38px;
      color: #fff;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      text-align: left;
    }

    .folder-language,
    .folder-count {
      color: #8e8e93;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.2;
    }

    .folder-name {
      grid-column: 1 / -1;
      color: #fff;
      font-size: 40px;
      line-height: 1.15;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .add-folder-button {
      min-height: 84px;
      margin-top: 22px;
      color: #70a7ff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 28px;
      font-weight: 800;
    }

    .plus {
      font-size: 48px;
      line-height: 0.8;
      font-weight: 300;
    }

    .study-header {
      display: grid;
      grid-template-columns: 52px 1fr 52px;
      align-items: center;
      margin-bottom: 22px;
    }

    .back-button {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: #1c1c1e;
      color: #70a7ff;
      font-size: 34px;
      line-height: 1;
    }

    .card-area {
      perspective: 1200px;
      touch-action: pan-y;
    }

    .card {
      position: relative;
      width: 100%;
      height: 560px;
      border: 0;
      padding: 0;
      background: transparent;
      color: inherit;
      transform-style: preserve-3d;
      transition: transform 0.45s ease;
      user-select: none;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 1px solid #2c2c2e;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0)),
        #1c1c1e;
      backface-visibility: hidden;
      padding: 36px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.48);
    }

    .card-front {
      align-items: center;
      justify-content: center;
    }

    .word {
      width: 100%;
      overflow-wrap: anywhere;
      text-align: center;
      font-size: 52px;
      line-height: 1.15;
      font-weight: 650;
      letter-spacing: 0;
    }

    .card-back {
      transform: rotateY(180deg);
      align-items: stretch;
      justify-content: flex-start;
      gap: 18px;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    .phonetic {
      color: #bf5af2;
      font-size: 28px;
      line-height: 1.25;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .detail,
    .frequent {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 21px;
      line-height: 1.55;
      letter-spacing: 0;
      font-family: inherit;
    }

    .detail {
      color: #f2f2f7;
    }

    .frequent {
      color: #30d158;
      font-weight: 650;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .nav-button {
      flex: 1;
      min-height: 52px;
      border: none;
      border-radius: 8px;
      background: #30d158;
      color: #000;
      font-size: 18px;
      font-weight: 700;
    }

    .empty-state {
      margin-top: 52px;
      border: 1px solid #252529;
      border-radius: 24px;
      background: #1c1c1e;
      padding: 42px 26px;
      text-align: center;
      color: #8e8e93;
      font-size: 22px;
      line-height: 1.5;
      font-weight: 700;
    }

    #counter {
      margin: 20px 0 0;
      text-align: center;
      color: #8e8e93;
      font-size: 16px;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      padding: 22px;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.68);
    }

    .modal[hidden],
    [hidden] {
      display: none;
    }

    .dialog {
      width: min(100%, 420px);
      border: 1px solid #2c2c2e;
      border-radius: 24px;
      background: #1c1c1e;
      padding: 24px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.62);
    }

    .dialog h2 {
      margin: 0 0 18px;
      font-size: 24px;
      line-height: 1.25;
    }

    .folder-name-input {
      width: 100%;
      min-height: 52px;
      border: 1px solid #3a3a3c;
      border-radius: 12px;
      background: #0f0f10;
      color: #fff;
      padding: 0 16px;
      font-size: 18px;
      outline: none;
    }

    .folder-name-input:focus {
      border-color: #70a7ff;
    }

    .dialog-actions {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }

    .dialog-button {
      flex: 1;
      min-height: 48px;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 750;
    }

    .cancel-button {
      background: #2c2c2e;
      color: #f2f2f7;
    }

    .confirm-button {
      background: #70a7ff;
      color: #000;
    }

    @media (max-width: 600px) {
      .app {
        padding: 22px 16px 28px;
      }

      h1 {
        font-size: 26px;
      }

      .folder-list {
        gap: 18px;
        margin-top: 38px;
      }

      .folder-item {
        min-height: 142px;
        padding: 30px 30px;
      }

      .folder-language,
      .folder-count {
        font-size: 22px;
      }

      .folder-name {
        font-size: 36px;
      }

      .add-folder-button {
        min-height: 82px;
        font-size: 28px;
      }

      .card {
        height: calc(100vh - 148px);
        min-height: 430px;
        max-height: 620px;
      }

      .card-face {
        padding: 28px;
      }

      .word {
        font-size: 44px;
      }

      .phonetic {
        font-size: 24px;
      }

      .detail,
      .frequent {
        font-size: 18px;
        line-height: 1.5;
      }

      .buttons {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section id="folderView" class="screen active">
      <h1 id="folderCountTitle"></h1>
      <div id="folderList" class="folder-list"></div>
      <button id="addFolderButton" class="add-folder-button" type="button">
        <span class="plus" aria-hidden="true">+</span>
        <span>新增資料夾</span>
      </button>
    </section>

    <section id="cardView" class="screen">
      <div class="study-header">
        <button id="backButton" class="back-button" type="button" aria-label="回資料夾">‹</button>
        <h1 id="deckTitle"></h1>
        <div></div>
      </div>

      <div id="studyArea">
        <div class="card-area">
          <section id="card" class="card" aria-label="TOEIC vocabulary flashcard">
            <div class="card-face card-front">
              <div id="word" class="word"></div>
            </div>

            <div class="card-face card-back">
              <div id="phonetic" class="phonetic"></div>
              <pre id="detail" class="detail"></pre>
              <pre id="frequent" class="frequent"></pre>
            </div>
          </section>
        </div>

        <div class="buttons" aria-label="字卡切換">
          <button class="nav-button" type="button" id="prevButton">上一張</button>
          <button class="nav-button" type="button" id="nextButton">下一張</button>
        </div>

        <p id="counter"></p>
      </div>

      <div id="emptyState" class="empty-state" hidden>這個資料夾目前沒有卡片</div>
    </section>
  </main>

  <div id="folderModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <form id="folderForm" class="dialog">
      <h2 id="modalTitle">新增資料夾</h2>
      <input id="folderNameInput" class="folder-name-input" type="text" placeholder="資料夾名稱" autocomplete="off" />
      <div class="dialog-actions">
        <button id="cancelFolderButton" class="dialog-button cancel-button" type="button">取消</button>
        <button class="dialog-button confirm-button" type="submit">確認</button>
      </div>
    </form>
  </div>

  <script>
    const STORAGE_KEY = "toeicFlashcardFoldersV2";
    const LEGACY_STORAGE_KEY = "toeicFlashcardFoldersV1";

    const defaultFolders = [
      {
        id: "toeic-day1",
        language: "English",
        name: "TOEIC DAY 1",
        cards: [
          {
            word: "Applicant",
            phonetic: "/ˈæplɪkənt/",
            detail: `N, 申請者；應徵者
All applicants are required to submit a resume.`,
            frequent: ""
          },
          {
            word: "Candidate",
            phonetic: "/ˈkændɪdət/",
            detail: `N, 候選者；應徵者
Five candidates will be selected for final interviews.`,
            frequent: ""
          },
          {
            word: "Reference",
            phonetic: "/ˈrɛfərəns/",
            detail: `N, 推薦信；參考
Philip asked his previous employer to write a reference letter for him.`,
            frequent: ""
          },
          {
            word: "Payroll",
            phonetic: "/ˈpeɪroʊl/",
            detail: `N, 薪水帳冊；發薪名單
Fifteen new employees were added to the payroll last month.`,
            frequent: `常考：on the payroll = 在員工名冊上；受雇於公司
Sullivan Printing currently has 22 staff members on the payroll.`
          },
          {
            word: "Entitle",
            phonetic: "/ɪnˈtaɪtəl/",
            detail: `V, 給某人權利
Executives are entitled to additional benefits.`,
            frequent: `常考：be entitled to + 名詞 = 有得到～的權利；
be entitled to do = 有做～的權利
entitle 主要會以和介系詞to 或to 不定詞連用的被動態型式出現在題目之中。`
          },
          {
            word: "Wage",
            phonetic: "/weɪdʒ/",
            detail: `N, 工資；薪水
Workers with formal education may earn higher wages than those without.`,
            frequent: ""
          },
          {
            word: "Recruit",
            phonetic: "/rɪˈkruːt/",
            detail: `V, 招募新進人員
The firm recruits promising graduates on a yearly basis.`,
            frequent: ""
          },
          {
            word: "Occupation",
            phonetic: "/ˌɑːkjuˈpeɪʃən/",
            detail: `N, 職業
Journalism is an interesting and challenging occupation.`,
            frequent: ""
          },
          {
            word: "Apprehensive",
            phonetic: "/ˌæprɪˈhɛnsɪv/",
            detail: `Adj, 擔心的；憂慮的
Many people feel apprehensive before an important job interview.`,
            frequent: ""
          },
          {
            word: "Prospective",
            phonetic: "/prəˈspɛktɪv/",
            detail: `Adj, 預期的；未來的
Prospective employees were asked to come in for a second interview.`,
            frequent: ""
          },
          {
            word: "Appeal",
            phonetic: "/əˈpiːl/",
            detail: `V, 呼籲；有吸引力
The 10 percent pay increase appealed to the staff.`,
            frequent: `常考：appeal to + 名詞 = 呼籲；對～有吸引力
appeal 是不及物動詞，通常和介系詞 to 連用。
表示引起某人的興趣或注意時，appeal to 可以換成 attract.`
          },
          {
            word: "Proficiency",
            phonetic: "/prəˈfɪʃənsi/",
            detail: `N, 熟練；精通
Overseas workers need proof of proficiency in a second language.`,
            frequent: ""
          },
          {
            word: "Diligent",
            phonetic: "/ˈdɪlɪdʒənt/",
            detail: `Adj, 勤奮的
Carmen is one of the most diligent workers in the company.`,
            frequent: ""
          },
          {
            word: "Eligible",
            phonetic: "/ˈɛlɪdʒəbəl/",
            detail: `Adj, 有資格的；合適的
The part-time workers are also eligible for paid holidays.`,
            frequent: `常考：be eligible for + membership / compensation / position = 有資格成為會員 / 得到補償 / 得到職位
be eligible to do = 有資格做～
eligible 主要會與介系詞 for 或 to 不定詞連用。`
          },
          {
            word: "Employment",
            phonetic: "/ɪmˈplɔɪmənt/",
            detail: `N, 雇用
The company announced employment opportunities in the personnel department.`,
            frequent: ""
          },
          {
            word: "Managerial",
            phonetic: "/ˌmænəˈdʒɪriəl/",
            detail: `Adj, 管理的
Mike is seeking a managerial position in the accounting department.`,
            frequent: `常考：managerial + staff / experience = 管理人員；管理經驗
managerial 經常和 staff 及 experience 搭配出題。`
          }
        ]
      }
    ];

    const folderView = document.getElementById("folderView");
    const cardView = document.getElementById("cardView");
    const folderCountTitle = document.getElementById("folderCountTitle");
    const folderList = document.getElementById("folderList");
    const addFolderButton = document.getElementById("addFolderButton");
    const folderModal = document.getElementById("folderModal");
    const folderForm = document.getElementById("folderForm");
    const folderNameInput = document.getElementById("folderNameInput");
    const cancelFolderButton = document.getElementById("cancelFolderButton");
    const backButton = document.getElementById("backButton");
    const deckTitle = document.getElementById("deckTitle");
    const studyArea = document.getElementById("studyArea");
    const emptyState = document.getElementById("emptyState");
    const card = document.getElementById("card");
    const word = document.getElementById("word");
    const phonetic = document.getElementById("phonetic");
    const detail = document.getElementById("detail");
    const frequent = document.getElementById("frequent");
    const counter = document.getElementById("counter");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");

    let folders = loadFolders();
    let activeFolderIndex = 0;
    let cardIndex = 0;
    let flipped = false;
    let pointerStartX = 0;
    let pointerStartY = 0;
    let trackingTouch = false;
    let suppressNextClick = false;

    function cloneDefaultFolders() {
      return JSON.parse(JSON.stringify(defaultFolders));
    }

    function normalizeFolders(rawFolders) {
      const normalizedFolders = rawFolders
        .filter((folder) => folder && typeof folder === "object")
        .map((folder, folderIndex) => ({
          id: folder.id || `folder-${folderIndex}`,
          language: folder.language || "English",
          name: folder.name || `資料夾 ${folderIndex + 1}`,
          cards: Array.isArray(folder.cards) ? folder.cards : []
        }));

      return normalizedFolders.length > 0 ? normalizedFolders : cloneDefaultFolders();
    }

    function replaceDefaultDayOne(savedFolders) {
      const nextFolders = normalizeFolders(savedFolders);
      const dayOne = cloneDefaultFolders()[0];
      const dayOneIndex = nextFolders.findIndex((folder) => folder.id === dayOne.id);

      if (dayOneIndex >= 0) {
        nextFolders[dayOneIndex] = dayOne;
      } else {
        nextFolders.unshift(dayOne);
      }

      return nextFolders;
    }

    function loadFolders() {
      const savedFolders = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(LEGACY_STORAGE_KEY);

      if (!savedFolders) {
        return cloneDefaultFolders();
      }

      try {
        const parsedFolders = JSON.parse(savedFolders);
        return Array.isArray(parsedFolders) ? replaceDefaultDayOne(parsedFolders) : cloneDefaultFolders();
      } catch {
        return cloneDefaultFolders();
      }
    }

    function saveFolders() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(folders));
    }

    function isMobileLayout() {
      return window.matchMedia("(max-width: 600px)").matches;
    }

    function setOptionalText(element, text) {
      element.textContent = text || "";
      element.hidden = !text;
    }

    function renderFolders() {
      folderCountTitle.textContent = `${folders.length} 個資料夾`;
      folderList.replaceChildren();

      folders.forEach((folder, folderIndex) => {
        const folderItem = document.createElement("button");
        const cardCount = folder.cards.length;

        folderItem.className = "folder-item";
        folderItem.type = "button";
        folderItem.innerHTML = `
          <span class="folder-language"></span>
          <span class="folder-count"></span>
          <span class="folder-name"></span>
        `;

        folderItem.querySelector(".folder-language").textContent = folder.language || "English";
        folderItem.querySelector(".folder-count").textContent = `${cardCount} 張卡片`;
        folderItem.querySelector(".folder-name").textContent = folder.name;
        folderItem.addEventListener("click", () => openFolder(folderIndex));
        folderList.appendChild(folderItem);
      });
    }

    function showFolderView() {
      folderView.classList.add("active");
      cardView.classList.remove("active");
      renderFolders();
    }

    function openFolder(folderIndex) {
      activeFolderIndex = folderIndex;
      cardIndex = 0;
      flipped = false;

      folderView.classList.remove("active");
      cardView.classList.add("active");
      deckTitle.textContent = folders[activeFolderIndex].name;
      showCard();
    }

    function showCard() {
      const currentFolder = folders[activeFolderIndex];
      const cards = currentFolder.cards;

      if (cards.length === 0) {
        studyArea.hidden = true;
        emptyState.hidden = false;
        return;
      }

      const cardData = cards[cardIndex];

      studyArea.hidden = false;
      emptyState.hidden = true;
      word.textContent = cardData.word;
      setOptionalText(phonetic, cardData.phonetic);
      setOptionalText(detail, cardData.detail);
      setOptionalText(frequent, cardData.frequent);
      counter.textContent = `${cardIndex + 1} / ${cards.length}`;

      flipped = false;
      card.classList.remove("flipped");
    }

    function flipCard() {
      flipped = !flipped;
      card.classList.toggle("flipped", flipped);
    }

    function nextCard() {
      const cards = folders[activeFolderIndex].cards;

      if (cards.length === 0) {
        return;
      }

      cardIndex = (cardIndex + 1) % cards.length;
      showCard();
    }

    function prevCard() {
      const cards = folders[activeFolderIndex].cards;

      if (cards.length === 0) {
        return;
      }

      cardIndex = (cardIndex - 1 + cards.length) % cards.length;
      showCard();
    }

    function openFolderModal() {
      folderNameInput.value = "";
      folderModal.hidden = false;
      folderNameInput.focus();
    }

    function closeFolderModal() {
      folderModal.hidden = true;
    }

    function createFolder(name) {
      folders.push({
        id: `folder-${Date.now()}`,
        language: "English",
        name,
        cards: []
      });

      saveFolders();
      renderFolders();
    }

    card.addEventListener("click", () => {
      if (suppressNextClick) {
        suppressNextClick = false;
        return;
      }

      flipCard();
    });

    card.addEventListener("pointerdown", (event) => {
      if (!isMobileLayout() || event.pointerType !== "touch") {
        return;
      }

      pointerStartX = event.clientX;
      pointerStartY = event.clientY;
      trackingTouch = true;
    });

    card.addEventListener("pointerup", (event) => {
      if (!trackingTouch) {
        return;
      }

      const deltaX = event.clientX - pointerStartX;
      const deltaY = event.clientY - pointerStartY;
      const isSwipe = Math.abs(deltaX) > 50 && Math.abs(deltaX) > Math.abs(deltaY) * 1.25;

      trackingTouch = false;

      if (!isSwipe) {
        return;
      }

      suppressNextClick = true;

      if (deltaX < 0) {
        nextCard();
      } else {
        prevCard();
      }
    });

    card.addEventListener("pointercancel", () => {
      trackingTouch = false;
    });

    addFolderButton.addEventListener("click", openFolderModal);
    cancelFolderButton.addEventListener("click", closeFolderModal);
    backButton.addEventListener("click", showFolderView);
    prevButton.addEventListener("click", prevCard);
    nextButton.addEventListener("click", nextCard);

    folderModal.addEventListener("click", (event) => {
      if (event.target === folderModal) {
        closeFolderModal();
      }
    });

    folderForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const folderName = folderNameInput.value.trim();

      if (!folderName) {
        folderNameInput.focus();
        return;
      }

      createFolder(folderName);
      closeFolderModal();
    });

    renderFolders();
    saveFolders();
  </script>
</body>
</html>
