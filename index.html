<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的 TOEIC 字卡</title>

  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #000;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100%, 560px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
    }

    h1 {
      margin: 0 0 24px;
      text-align: center;
      font-size: 26px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .card-area {
      perspective: 1200px;
      touch-action: pan-y;
    }

    .card {
      position: relative;
      width: 100%;
      height: 560px;
      border: 0;
      padding: 0;
      background: transparent;
      color: inherit;
      transform-style: preserve-3d;
      transition: transform 0.45s ease;
      cursor: pointer;
      user-select: none;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 1px solid #2c2c2e;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0)),
        #1c1c1e;
      backface-visibility: hidden;
      padding: 36px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.48);
    }

    .card-front {
      align-items: center;
      justify-content: center;
    }

    .word {
      width: 100%;
      overflow-wrap: anywhere;
      text-align: center;
      font-size: 52px;
      line-height: 1.15;
      font-weight: 650;
      letter-spacing: 0;
    }

    .card-back {
      transform: rotateY(180deg);
      align-items: stretch;
      justify-content: flex-start;
      gap: 18px;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    .phonetic {
      color: #bf5af2;
      font-size: 28px;
      line-height: 1.25;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .detail,
    .frequent {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 21px;
      line-height: 1.55;
      letter-spacing: 0;
    }

    .detail {
      color: #f2f2f7;
    }

    .frequent {
      color: #30d158;
      font-weight: 650;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    button.nav-button {
      flex: 1;
      min-height: 52px;
      border: none;
      border-radius: 8px;
      background: #30d158;
      color: #000;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    button.nav-button:active {
      transform: translateY(1px);
    }

    #counter {
      margin: 20px 0 0;
      text-align: center;
      color: #8e8e93;
      font-size: 16px;
    }

    @media (max-width: 600px) {
      .app {
        padding: 22px 16px;
      }

      h1 {
        margin-bottom: 18px;
        font-size: 22px;
      }

      .card {
        height: calc(100vh - 126px);
        min-height: 430px;
        max-height: 620px;
      }

      .card-face {
        padding: 28px;
      }

      .word {
        font-size: 44px;
      }

      .phonetic {
        font-size: 24px;
      }

      .detail,
      .frequent {
        font-size: 18px;
        line-height: 1.5;
      }

      .buttons {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <h1>我的 TOEIC 字卡</h1>

    <div class="card-area">
      <section id="card" class="card" aria-label="TOEIC vocabulary flashcard">
        <div class="card-face card-front">
          <div id="word" class="word"></div>
        </div>

        <div class="card-face card-back">
          <div id="phonetic" class="phonetic"></div>
          <pre id="detail" class="detail"></pre>
          <pre id="frequent" class="frequent"></pre>
        </div>
      </section>
    </div>

    <div class="buttons" aria-label="字卡切換">
      <button class="nav-button" type="button" id="prevButton">上一張</button>
      <button class="nav-button" type="button" id="nextButton">下一張</button>
    </div>

    <p id="counter"></p>
  </main>

  <script>
    const words = [
      {
        word: "effect",
        phonetic: "[I'fekt]",
        detail: `N,效力;效果;影響
The incentive policy will be in effect starting next
week.
V,造成結果
He effected a sudden change in the company's
expansion plan.`,
        frequent: `常考:
in effect=法律等有效力的;生效的
come into effect =實施;生效
take effect =法律等生效;實施
have an effect on=對〜有影響
secondary effect=次級效應
effect 的慣用語很常考,所以請牢記這些慣用語。
請區分effect(N,效果;影響)和effective(Adj,有
效的)的詞性。
put into effect 可以替換成apply。`
      },
      {
        word: "obligation",
        phonetic: "",
        detail: `N,義務;責任
Employees have an obligation to follow company policy.`,
        frequent: ""
      },
      {
        word: "analyze",
        phonetic: "",
        detail: `V,分析
The team will analyze the survey results before making a decision.`,
        frequent: ""
      },
      {
        word: "verify",
        phonetic: "",
        detail: `V,查證;確認
Please verify your contact information before submitting the form.`,
        frequent: ""
      }
    ];

    const card = document.getElementById("card");
    const word = document.getElementById("word");
    const phonetic = document.getElementById("phonetic");
    const detail = document.getElementById("detail");
    const frequent = document.getElementById("frequent");
    const counter = document.getElementById("counter");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");

    let index = 0;
    let flipped = false;
    let pointerStartX = 0;
    let pointerStartY = 0;
    let trackingTouch = false;
    let suppressNextClick = false;

    function isMobileLayout() {
      return window.matchMedia("(max-width: 600px)").matches;
    }

    function setOptionalText(element, text) {
      element.textContent = text || "";
      element.hidden = !text;
    }

    function showCard() {
      const cardData = words[index];

      word.textContent = cardData.word;
      setOptionalText(phonetic, cardData.phonetic);
      setOptionalText(detail, cardData.detail);
      setOptionalText(frequent, cardData.frequent);
      counter.textContent = `${index + 1} / ${words.length}`;

      flipped = false;
      card.classList.remove("flipped");
    }

    function flipCard() {
      flipped = !flipped;
      card.classList.toggle("flipped", flipped);
    }

    function nextCard() {
      index = (index + 1) % words.length;
      showCard();
    }

    function prevCard() {
      index = (index - 1 + words.length) % words.length;
      showCard();
    }

    card.addEventListener("click", () => {
      if (suppressNextClick) {
        suppressNextClick = false;
        return;
      }

      flipCard();
    });

    card.addEventListener("pointerdown", (event) => {
      if (!isMobileLayout() || event.pointerType !== "touch") {
        return;
      }

      pointerStartX = event.clientX;
      pointerStartY = event.clientY;
      trackingTouch = true;
    });

    card.addEventListener("pointerup", (event) => {
      if (!trackingTouch) {
        return;
      }

      const deltaX = event.clientX - pointerStartX;
      const deltaY = event.clientY - pointerStartY;
      const isSwipe = Math.abs(deltaX) > 50 && Math.abs(deltaX) > Math.abs(deltaY) * 1.25;

      trackingTouch = false;

      if (!isSwipe) {
        return;
      }

      suppressNextClick = true;

      if (deltaX < 0) {
        nextCard();
      } else {
        prevCard();
      }
    });

    card.addEventListener("pointercancel", () => {
      trackingTouch = false;
    });

    prevButton.addEventListener("click", prevCard);
    nextButton.addEventListener("click", nextCard);

    showCard();
  </script>
</body>
</html>
